<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-mode">
    <div class="glow-bg"></div>
    <div class="app-container">
        <nav class="side-nav">
            <div class="brand"><div class="brand-icon">A</div><span>AEGIS</span></div>
            <div class="nav-links"><a href="#" class="nav-link active">Protection</a></div>
            <div class="nav-footer"><div class="user-badge">V9.5 VOID ENGINE</div></div>
        </nav>
        <main class="content-wrapper">
            <header class="main-header">
                <div class="header-info"><h1>Script Protection</h1><p>Real-time Secure Virtualization</p></div>
                <div class="header-stats"><div class="stat-pill">System: <span>Online</span></div></div>
            </header>
            <div class="obfuscator-grid">
                <div class="panel glass">
                    <div class="panel-header"><span>Source Code</span><button id="btn-clear" class="btn-system">CLEAR</button></div>
                    <textarea id="code-input" placeholder="-- Paste code here..."></textarea>
                </div>
                <div class="controls-panel glass">
                    <div class="control-group"><label>Script Name</label><input type="text" id="script-name" placeholder="Name..."></div>
                    <div class="control-group">
                        <div class="toggle-box" style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(255,255,255,0.02);border-radius:10px;border:1px solid rgba(255,255,255,0.05);">
                            <span style="font-size:0.8rem;color:#aaa;">Pastefy Mode</span><label class="switch"><input type="checkbox" id="use-pastefy"><span class="slider"></span></label>
                        </div>
                    </div>
                    <button id="btn-obfuscate" class="btn-primary-glow">PROTECT & PUBLISH</button>
                    <div class="stat-box" style="margin-top:10px;text-align:center;padding:10px;background:rgba(0,212,255,0.05);border-radius:8px;border:1px solid rgba(0,212,255,0.1);">
                        <div style="font-size:0.6rem;color:#00d4ff;">ACTIVE CONNECTIONS</div><div id="active-count" style="font-weight:700;font-size:1.1rem;">0</div>
                    </div>
                </div>
                <div class="panel glass">
                    <div class="panel-header"><span>Protected Result</span><button id="btn-copy" class="btn-system">COPY</button></div>
                    <textarea id="code-output" readonly placeholder="Output..."></textarea>
                </div>
            </div>
            <div class="dashboard-footer" style="display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:40px;">
                <section><h2>My History</h2><div id="history-list" class="history-grid"></div></section>
                <section><h2>Live User Activity</h2><div id="live-logs" class="history-grid" style="max-height:400px;overflow-y:auto;background:rgba(0,0,0,0.2);border-radius:15px;padding:10px;"></div></section>
            </div>
        </main>
    </div>
    <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
