<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS AZURE | Premium Obfuscator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-mode">
    <canvas id="particle-canvas"></canvas> <!-- Effetto particelle blu -->
    
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand"><div class="brand-icon">A</div><span>AEGIS</span></div>
            <nav class="nav-links">
                <a href="#" class="nav-link active">Dashboard</a>
                <a href="#" class="nav-link">History</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Script Protection</h1>
                <p>Azure Vantablack Engine v8.1</p>
            </header>

            <div class="grid">
                <div class="card glass">
                    <div class="card-header">Input <button id="btn-clear">Clear</button></div>
                    <textarea id="code-input" placeholder="-- Paste code here..."></textarea>
                </div>

                <div class="controls card glass">
                    <input type="text" id="script-name" placeholder="Script Name">
                    <div class="toggle-row">
                        <span>Pastefy</span>
                        <label class="switch"><input type="checkbox" id="use-pastefy"><span class="slider"></span></label>
                    </div>
                    <button id="btn-obfuscate" class="btn-glow">PROTECT SCRIPT</button>
                </div>

                <div class="card glass">
                    <div class="card-header">Result <button id="btn-copy">Copy</button></div>
                    <textarea id="code-output" readonly placeholder="Result..."></textarea>
                </div>
            </div>

            <section class="history">
                <h2>Recent Activity</h2>
                <div id="history-list"></div>
            </section>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
