<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-mode">
    <div class="glow-bg"></div>
    <div class="app-container">
        <!-- Sidebar Inteligente -->
        <nav class="side-nav">
            <div class="brand"><div class="brand-icon">A</div><span>AEGIS</span></div>
            <div class="nav-section">
                <p class="nav-label">Main</p>
                <a href="#" class="nav-link active">Obfuscation</a>
            </div>
            <div class="nav-section">
                <p class="nav-label">Live Activity</p>
                <div id="live-logs" class="sidebar-logs">
                    <p style="font-size:0.7rem; color:#444; text-align:center;">No activity...</p>
                </div>
            </div>
            <div class="nav-footer"><div class="user-badge">ADMIN ACCESS</div></div>
        </nav>

        <!-- Main Content Vertical -->
        <main class="content-wrapper">
            <header class="main-header">
                <div class="header-info"><h1>Obfuscator Engine</h1><p>Vantablack v8.1 | Webhook Logging Enabled</p></div>
            </header>

            <div class="vertical-layout">
                <!-- Top: Input -->
                <div class="panel glass">
                    <div class="panel-header">
                        <span>Original Source</span>
                        <div class="header-btns">
                            <button id="btn-upload-trigger" class="btn-system">UPLOAD FILE</button>
                            <input type="file" id="file-input" accept=".lua" style="display:none">
                            <button id="btn-clear" class="btn-system">CLEAR</button>
                        </div>
                    </div>
                    <textarea id="code-input" placeholder="-- Paste code or upload file..."></textarea>
                </div>

                <!-- Middle: Controls -->
                <div class="controls-bar glass">
                    <input type="text" id="script-name" placeholder="Script Name (e.g. MyScript)">
                    <button id="btn-obfuscate" class="btn-primary-glow">PROTECT SCRIPT</button>
                </div>

                <!-- Bottom: Output -->
                <div class="panel glass">
                    <div class="panel-header">
                        <span>Protected Code</span>
                        <button id="btn-copy" class="btn-system">COPY RESULT</button>
                    </div>
                    <textarea id="code-output" readonly placeholder="Output will appear here..."></textarea>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
